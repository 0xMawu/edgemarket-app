# Server port
server.port=8080

# Neon PostgreSQL
spring.datasource.url=jdbc:postgresql://ep-blue-wave-ad0nqt9o.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require&sslrootcert=SYSTEM
spring.datasource.username=neondb_owner
# Set via environment variable — do NOT hardcode the password here.
# export DB_PASSWORD="your-neon-password"   (Linux/macOS/Git Bash)
# $env:DB_PASSWORD="your-neon-password"     (Windows PowerShell)
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - Neon compatible settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.data-source-properties.tcpKeepAlive=true

# Run schema.sql automatically on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Trade watcher interval (ms)
watcher.interval.ms=60000

# CORS
cors.allowed-origins=*

# JWT — set via environment variable (min 256-bit key)
# export JWT_SECRET="your-256-bit-or-longer-base64-key"   (Linux/macOS/Git Bash)
# $env:JWT_SECRET="your-256-bit-or-longer-base64-key"     (Windows PowerShell)
auth.jwt.secret=${JWT_SECRET}

# SendGrid email delivery
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=noreply@edgemarket.app
