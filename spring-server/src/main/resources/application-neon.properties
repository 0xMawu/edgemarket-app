# Neon Postgres profile — activate with: --spring.profiles.active=neon
# Or set SPRING_PROFILES_ACTIVE=neon in your environment

# Replace with your actual Neon connection string
spring.datasource.url=jdbc:postgresql://ep-blue-wave-ad0nqt9o.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require
